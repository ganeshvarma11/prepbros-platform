    <script>
      (function () {
        try {
          var d = document.documentElement;
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var themeKey = "prepbros-ui-theme";
          var prefsKey = "prepbros-preferences-v2";
          var storedTheme = localStorage.getItem(themeKey);
          var storedPrefs = localStorage.getItem(prefsKey);
          var parsedPrefs = storedPrefs ? JSON.parse(storedPrefs) : null;
          var adaptiveDarkMode = Boolean(parsedPrefs && parsedPrefs.adaptiveDarkMode);
          var isDark =
            storedTheme === "dark" ||
            storedTheme === "system"
              ? prefersDark
              : adaptiveDarkMode && prefersDark;

          d.classList.remove("light", "dark", "prepbros-dark");
          d.classList.add(isDark ? "dark" : "light");
          if (isDark) d.classList.add("prepbros-dark");
          d.dataset.language =
            parsedPrefs && parsedPrefs.language === "hi" ? "hi" : "en";
          d.lang = d.dataset.language;
          d.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
